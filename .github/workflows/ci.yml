name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

permissions:
  contents: read
  packages: write

jobs:
  build:
    strategy:
      matrix:
        os: [ windows-latest, ubuntu-latest, macos-latest ]
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore dependencies
        run: dotnet restore src/Atlantis/Atlantis.csproj

      - name: Restore test dependencies
        run: dotnet restore tests/Atlantis.Tests/Atlantis.Tests.csproj

      - name: Build
        run: dotnet build src/Atlantis/Atlantis.csproj --no-restore

      - name: Test
        run: dotnet test tests/Atlantis.Tests/Atlantis.Tests.csproj --no-restore --verbosity normal

      - name: Publish (Native AOT)
        run: dotnet publish src/Atlantis/Atlantis.csproj --no-restore -c Release

  cli-tool:
    strategy:
      matrix:
        include:
          - os: windows-latest
            rid: win-x64
          - os: ubuntu-latest
            rid: linux-x64
          - os: macos-latest
            rid: osx-arm64
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Build CLI
        run: dotnet build src/Atlantis.Cli/Atlantis.Cli.csproj -c Release

      - name: Pack pointer package
        if: matrix.rid == 'linux-x64'
        run: dotnet pack src/Atlantis.Cli/Atlantis.Cli.csproj -c Release --no-build

      - name: Pack AOT package (${{ matrix.rid }})
        run: dotnet pack src/Atlantis.Cli/Atlantis.Cli.csproj -c Release -r ${{ matrix.rid }}

      - name: Pack fallback package
        if: matrix.rid == 'linux-x64'
        run: dotnet pack src/Atlantis.Cli/Atlantis.Cli.csproj -c Release -r any -p:PublishAot=false

      - name: Upload NuGet packages
        uses: actions/upload-artifact@v4
        with:
          name: nuget-${{ matrix.rid }}
          path: artifacts/package/release/*.nupkg

      - name: Push to GitHub Packages
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: dotnet nuget push artifacts/package/release/*.nupkg --source "https://nuget.pkg.github.com/${{ github.repository_owner }}/index.json" --api-key ${{ secrets.GITHUB_TOKEN }} --skip-duplicate

name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

permissions:
  contents: read
  packages: write
  id-token: write  # For OIDC trusted publishing to nuget.org

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: windows-latest
            rid: win-x64
          - os: ubuntu-latest
            rid: linux-x64
          - os: macos-latest
            rid: osx-arm64
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Set version suffix
        id: version
        shell: bash
        run: echo "suffix=ci.${{ github.run_number }}" >> $GITHUB_OUTPUT

      # Build and test Atlantis
      - name: Build Atlantis
        run: dotnet build src/Atlantis/Atlantis.csproj -c Release

      - name: Test
        run: dotnet test tests/Atlantis.Tests/Atlantis.Tests.csproj -c Release --verbosity normal

      - name: Publish Atlantis (Native AOT)
        run: dotnet publish src/Atlantis/Atlantis.csproj -c Release

      # Build CLI
      - name: Build CLI
        run: dotnet build src/Atlantis.Cli/Atlantis.Cli.csproj -c Release

      - name: Pack CLI pointer package
        if: matrix.rid == 'linux-x64'
        run: dotnet pack src/Atlantis.Cli/Atlantis.Cli.csproj -c Release --no-build --version-suffix ${{ steps.version.outputs.suffix }}

      - name: Pack CLI AOT package (${{ matrix.rid }})
        run: dotnet pack src/Atlantis.Cli/Atlantis.Cli.csproj -c Release -r ${{ matrix.rid }} --version-suffix ${{ steps.version.outputs.suffix }}

      - name: Pack CLI fallback package
        if: matrix.rid == 'linux-x64'
        run: dotnet pack src/Atlantis.Cli/Atlantis.Cli.csproj -c Release -r any -p:PublishAot=false --version-suffix ${{ steps.version.outputs.suffix }}

      # Build Analyzers (only on linux - netstandard2.0 is cross-platform)
      - name: Build Analyzers
        if: matrix.rid == 'linux-x64'
        run: dotnet build src/Atlantis.Analyzers/Atlantis.Analyzers.csproj -c Release

      - name: Pack Analyzers
        if: matrix.rid == 'linux-x64'
        run: dotnet pack src/Atlantis.Analyzers/Atlantis.Analyzers.csproj -c Release --no-build --version-suffix ${{ steps.version.outputs.suffix }}

      # Upload artifacts
      - name: Upload CLI packages
        uses: actions/upload-artifact@v4
        with:
          name: nuget-cli-${{ matrix.rid }}
          path: artifacts/package/release/atl.*.nupkg

      - name: Upload Analyzer package
        if: matrix.rid == 'linux-x64'
        uses: actions/upload-artifact@v4
        with:
          name: nuget-analyzers
          path: artifacts/package/release/Atlantis.Analyzers.*.nupkg

      # Publish to GitHub Packages
      - name: Push to GitHub Packages
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: dotnet nuget push "artifacts/package/release/*.nupkg" --source "https://nuget.pkg.github.com/${{ github.repository_owner }}/index.json" --api-key ${{ secrets.GITHUB_TOKEN }} --skip-duplicate

      # Publish to nuget.org (only from linux to avoid duplicate pushes)
      - name: Login to nuget.org (OIDC)
        if: matrix.rid == 'linux-x64' && github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: NuGet/login@v1
        id: login
        with:
          user: ${{ secrets.NUGET_USER }}

      - name: Push to nuget.org
        if: matrix.rid == 'linux-x64' && github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: dotnet nuget push "artifacts/package/release/*.nupkg" --api-key ${{steps.login.outputs.NUGET_API_KEY}} --source https://api.nuget.org/v3/index.json --skip-duplicate

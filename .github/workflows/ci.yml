name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

permissions:
  contents: read

jobs:
  build:
    strategy:
      matrix:
        os: [ windows-latest, ubuntu-latest ]
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '11.0.x'

      - name: Restore dependencies
        run: dotnet restore src/Atlantis/Atlantis.csproj

      - name: Restore test dependencies
        run: dotnet restore src/Atlantis.Tests/Atlantis.Tests.csproj

      - name: Build
        run: dotnet build src/Atlantis/Atlantis.csproj --no-restore

      - name: Test
        run: dotnet test src/Atlantis.Tests/Atlantis.Tests.csproj --no-restore --verbosity normal

      - name: Publish (Native AOT)
        run: dotnet publish src/Atlantis/Atlantis.csproj --no-restore -c Release
